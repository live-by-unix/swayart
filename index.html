<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelSway</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-panel: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --canvas-bg-dark: #cbd5e1;
            --canvas-bg-light: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-panel: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --canvas-bg-dark: #1e293b;
            --canvas-bg-light: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.2s, color 0.2s;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .version {
            font-size: 0.75rem;
            background: var(--accent-color);
            color: #fff;
            padding: 2px 6px;
            border-radius: 9999px;
            margin-left: 4px;
        }

        .app-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .workspace {
            flex: 1;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .group-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .label-val {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #ratio-val {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .help-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 40px;
        }

        .file-upload-wrapper input {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .file-custom {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-main);
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        .color-lock-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .indicator-box {
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .palette-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--bg-main);
            padding: 10px;
            border-radius: 6px;
            min-height: 50px;
            align-content: flex-start;
        }

        .empty-palette-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: auto;
        }

        .swatch {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid rgba(0,0,0,0.15);
            transition: transform 0.1s, border-color 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            user-select: none;
        }

        .swatch.selected {
            border-color: var(--accent-color);
            transform: scale(1.1);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }

        .swatch:hover:not(.selected) {
            transform: scale(1.05);
        }

        .btn {
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: background-color 0.1s;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) { background-color: var(--accent-hover); }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-secondary:hover { background-color: var(--border-color); }

        .btn-block { width: 100%; margin-top: auto; }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            overflow: auto;
            max-width: 100%;
            max-height: 100%;
            background-image: linear-gradient(45deg, var(--canvas-bg-dark) 25%, transparent 25%), linear-gradient(-45deg, var(--canvas-bg-dark) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, var(--canvas-bg-dark) 75%), linear-gradient(-45deg, transparent 75%, var(--canvas-bg-dark) 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: var(--canvas-bg-light);
        }

        .drop-zone-text {
            padding: 60px;
            text-align: center;
            color: var(--text-muted);
            font-weight: 500;
            border: 3px dashed var(--border-color);
            border-radius: 12px;
            transition: border-color 0.2s;
        }

        .drop-zone-text.dragover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        canvas {
            display: none;
            image-rendering: pixelated;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">👾 PixelSway <span class="version">v1.0</span></div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn btn-secondary">🌓 Toggle Theme</button>
        </div>
    </header>

    <main class="app-container">
        <section class="sidebar">
            <div class="control-group">
                <label class="group-title">1. Import Image</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="upload" accept="image/png, image/jpeg">
                    <span class="file-custom" id="file-label">Choose PNG/JPEG...</span>
                </div>
            </div>

            <div class="control-group">
                <div class="label-val">
                    <label for="pixel-size" class="group-title">2. Pixel Ratio</label>
                    <span id="ratio-val">16px</span>
                </div>
                <input type="range" id="pixel-size" min="4" max="32" value="16" step="2">
            </div>

            <div class="control-group">
                <div class="label-val">
                    <label for="smoothness" class="group-title">Smoothness</label>
                    <span id="smooth-val">0px</span>
                </div>
                <input type="range" id="smoothness" min="0" max="8" value="0" step="1">
            </div>

            <div class="control-group">
                <div class="label-val">
                    <label for="max-colors" class="group-title">Number of Colors</label>
                    <span id="colors-val">8</span>
                </div>
                <input type="range" id="max-colors" min="4" max="24" value="8" step="1">
            </div>

            <div class="control-group">
                <label class="group-title">3. Color-By-Number Palette</label>
                <p class="help-text">Select a numbered color from your generated palette below. Then drag (sway) your mouse across the blank canvas numbers to paint them in!</p>
                
                <div class="color-lock-status">
                    <span>Active Paint Color:</span>
                    <div id="target-indicator" class="indicator-box">None</div>
                </div>
            </div>

            <div class="control-group">
                <label class="group-title">Palette Pickers</label>
                <div id="auto-palette" class="palette-grid">
                    <span class="empty-palette-text">Upload an image to generate palette</span>
                </div>
            </div>

            <button id="export" class="btn btn-primary btn-block" disabled>💾 Export High-Res PNG</button>
        </section>

        <section class="workspace">
            <div id="canvas-container" class="canvas-wrapper">
                <div id="drop-zone-text" class="drop-zone-text">
                    <p>Drag & Drop or Upload an Image to Begin</p>
                </div>
                <canvas id="canvas"></canvas>
            </div>
        </section>
    </main>

    <script>
        const state = {
            originalImage: null,
            activeColorIndex: -1,
            isSwaying: false,
            pixelSize: 16,
            smoothRadius: 0,
            maxColors: 8,
            palette: [], 
            mapData: [] 
        };

        const el = {
            html: document.documentElement,
            themeToggle: document.getElementById('theme-toggle'),
            upload: document.getElementById('upload'),
            fileLabel: document.getElementById('file-label'),
            pixelSizeSlider: document.getElementById('pixel-size'),
            ratioVal: document.getElementById('ratio-val'),
            smoothnessSlider: document.getElementById('smoothness'),
            smoothVal: document.getElementById('smooth-val'),
            colorsSlider: document.getElementById('max-colors'),
            colorsVal: document.getElementById('colors-val'),
            exportBtn: document.getElementById('export'),
            targetIndicator: document.getElementById('target-indicator'),
            autoPalette: document.getElementById('auto-palette'),
            canvas: document.getElementById('canvas'),
            canvasContainer: document.getElementById('canvas-container'),
            dropZoneText: document.getElementById('drop-zone-text'),
            ctx: document.getElementById('canvas').getContext('2d')
        };

        el.themeToggle.addEventListener('click', () => {
            const currentTheme = el.html.getAttribute('data-theme');
            el.html.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
            if (state.originalImage) renderBlankMap();
        });

        function handleImageLoad(src, fileName) {
            el.fileLabel.textContent = fileName;
            const img = new Image();
            img.onload = () => {
                state.originalImage = img;
                el.dropZoneText.style.display = 'none';
                el.canvas.style.display = 'block';
                el.exportBtn.disabled = false;
                processImageToPaletteAndMap();
            };
            img.src = src;
        }

        el.upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => handleImageLoad(event.target.result, file.name);
            reader.readAsDataURL(file);
        });

        el.canvasContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            el.dropZoneText.classList.add('dragover');
        });

        el.canvasContainer.addEventListener('dragleave', () => {
            el.dropZoneText.classList.remove('dragover');
        });

        el.canvasContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            el.dropZoneText.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && (file.type === "image/png" || file.type === "image/jpeg")) {
                const reader = new FileReader();
                reader.onload = (event) => handleImageLoad(event.target.result, file.name);
                reader.readAsDataURL(file);
            }
        });

        el.pixelSizeSlider.addEventListener('input', (e) => {
            state.pixelSize = parseInt(e.target.value);
            el.ratioVal.textContent = `${state.pixelSize}px`;
            if (state.originalImage) processImageToPaletteAndMap();
        });

        el.smoothnessSlider.addEventListener('input', (e) => {
            state.smoothRadius = parseInt(e.target.value);
            el.smoothVal.textContent = `${state.smoothRadius}px`;
            if (state.originalImage) processImageToPaletteAndMap();
        });

        el.colorsSlider.addEventListener('input', (e) => {
            state.maxColors = parseInt(e.target.value);
            el.colorsVal.textContent = state.maxColors;
            if (state.originalImage) processImageToPaletteAndMap();
        });

        function processImageToPaletteAndMap() {
            const img = state.originalImage;
            const size = state.pixelSize;
            const w = Math.max(4, Math.floor(img.width / size));
            const h = Math.max(4, Math.floor(img.height / size));

            el.canvas.width = w * size;
            el.canvas.height = h * size;
            el.canvas.style.width = `${w * size}px`;
            el.canvas.style.height = `${h * size}px`;

            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = w;
            tempCanvas.height = h;

            if (state.smoothRadius > 0) {
                tempCtx.imageSmoothingEnabled = true;
                tempCtx.imageSmoothingQuality = 'high';
                
                const steps = state.smoothRadius;
                let currentW = img.width;
                let currentH = img.height;
                
                const stepCanvas = document.createElement('canvas');
                const stepCtx = stepCanvas.getContext('2d');
                stepCanvas.width = img.width;
                stepCanvas.height = img.height;
                stepCtx.drawImage(img, 0, 0);

                for (let i = 0; i < steps; i++) {
                    currentW = Math.max(w, Math.floor(currentW * 0.7));
                    currentH = Math.max(h, Math.floor(currentH * 0.7));
                    
                    const nextCanvas = document.createElement('canvas');
                    const nextCtx = nextCanvas.getContext('2d');
                    nextCanvas.width = currentW;
                    nextCanvas.height = currentH;
                    nextCtx.imageSmoothingEnabled = true;
                    nextCtx.imageSmoothingQuality = 'high';
                    
                    nextCtx.drawImage(stepCanvas, 0, 0, stepCanvas.width, stepCanvas.height, 0, 0, currentW, currentH);
                    
                    stepCanvas.width = currentW;
                    stepCanvas.height = currentH;
                    stepCtx.drawImage(nextCanvas, 0, 0);
                    
                    if (currentW === w && currentH === h) break;
                }
                tempCtx.drawImage(stepCanvas, 0, 0, stepCanvas.width, stepCanvas.height, 0, 0, w, h);
            } else {
                tempCtx.imageSmoothingEnabled = false;
                tempCtx.drawImage(img, 0, 0, w, h);
            }

            const imgDataObj = tempCtx.getImageData(0, 0, w, h);
            const data = imgDataObj.data;

            const colorCounts = {};
            for (let i = 0; i < data.length; i += 4) {
                if (data[i+3] < 30) continue;
                const hex = rgbToHex(data[i], data[i+1], data[i+2]);
                colorCounts[hex] = (colorCounts[hex] || 0) + 1;
            }

            const sortedColors = Object.keys(colorCounts).sort((a, b) => colorCounts[b] - colorCounts[a]);
            state.palette = sortedColors.slice(0, state.maxColors);

            state.mapData = [];
            for (let y = 0; y < h; y++) {
                const row = [];
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    if (data[idx+3] < 30) {
                        row.push({ targetIndex: -1, painted: true, color: '#ffffff' });
                        continue;
                    }
                    const currentHex = rgbToHex(data[idx], data[idx+1], data[idx+2]);
                    let paletteIdx = state.palette.indexOf(currentHex);
                    
                    if (paletteIdx === -1) {
                        let minDist = Infinity;
                        let bestIdx = 0;
                        const r1 = data[idx], g1 = data[idx+1], b1 = data[idx+2];
                        
                        state.palette.forEach((pColor, pIdx) => {
                            const r2 = parseInt(pColor.slice(1,3), 16);
                            const g2 = parseInt(pColor.slice(3,5), 16);
                            const b2 = parseInt(pColor.slice(5,7), 16);
                            const dist = Math.pow(r1-r2, 2) + Math.pow(g1-g2, 2) + Math.pow(b1-b2, 2);
                            if (dist < minDist) {
                                minDist = dist;
                                bestIdx = pIdx;
                            }
                        });
                        paletteIdx = bestIdx;
                    }
                    
                    row.push({
                        targetIndex: paletteIdx,
                        painted: false,
                        color: state.palette[paletteIdx]
                    });
                }
                state.mapData.push(row);
            }

            state.activeColorIndex = 0;
            renderPaletteUI();
            renderBlankMap();
        }

        function renderPaletteUI() {
            el.autoPalette.innerHTML = '';
            state.palette.forEach((hex, idx) => {
                const swatch = document.createElement('div');
                swatch.className = `swatch ${idx === state.activeColorIndex ? 'selected' : ''}`;
                swatch.style.backgroundColor = hex;
                swatch.textContent = idx + 1;
                
                const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
                swatch.style.color = (r*0.299 + g*0.587 + b*0.114) > 186 ? '#000' : '#fff';
                
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
                    swatch.classList.add('selected');
                    state.activeColorIndex = idx;
                    updateActiveIndicator();
                });
                el.autoPalette.appendChild(swatch);
            });
            updateActiveIndicator();
        }

        function updateActiveIndicator() {
            if (state.activeColorIndex === -1 || state.palette.length === 0) {
                el.targetIndicator.textContent = "None";
                el.targetIndicator.style.backgroundColor = "transparent";
                el.targetIndicator.style.color = "inherit";
                return;
            }
            const currentHex = state.palette[state.activeColorIndex];
            el.targetIndicator.textContent = `Color #${state.activeColorIndex + 1}`;
            el.targetIndicator.style.backgroundColor = currentHex;
            const r = parseInt(currentHex.slice(1,3), 16), g = parseInt(currentHex.slice(3,5), 16), b = parseInt(currentHex.slice(5,7), 16);
            el.targetIndicator.style.color = (r*0.299 + g*0.587 + b*0.114) > 186 ? '#000' : '#fff';
        }

        function renderBlankMap() {
            if (!state.mapData.length) return;
            const h = state.mapData.length;
            const w = state.mapData[0].length;
            const size = state.pixelSize;

            el.ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);
            
            const isDarkMode = el.html.getAttribute('data-theme') === 'dark';
            const gridColor = isDarkMode ? '#334155' : '#cbd5e1';
            const numColor = isDarkMode ? '#475569' : '#94a3b8';

            el.ctx.textAlign = 'center';
            el.ctx.textBaseline = 'middle';
            el.ctx.font = `bold ${Math.max(8, Math.floor(size * 0.5))}px sans-serif`;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const cell = state.mapData[y][x];
                    
                    if (cell.painted) {
                        el.ctx.fillStyle = cell.color;
                        el.ctx.fillRect(x * size, y * size, size, size);
                    } else {
                        el.ctx.fillStyle = isDarkMode ? '#1e293b' : '#ffffff';
                        el.ctx.fillRect(x * size, y * size, size, size);
                        
                        el.ctx.strokeStyle = gridColor;
                        el.ctx.lineWidth = 0.5;
                        el.ctx.strokeRect(x * size, y * size, size, size);

                        if (cell.targetIndex !== -1) {
                            el.ctx.fillStyle = numColor;
                            el.ctx.fillText(cell.targetIndex + 1, x * size + size / 2, y * size + size / 2);
                        }
                    }
                }
            }
        }

        function getCanvasCoords(e) {
            const rect = el.canvas.getBoundingClientRect();
            return {
                x: Math.floor((e.clientX - rect.left) * (el.canvas.width / rect.width)),
                y: Math.floor((e.clientY - rect.top) * (el.canvas.height / rect.height))
            };
        }

        el.canvas.addEventListener('mousedown', (e) => {
            if (!state.originalImage || state.activeColorIndex === -1) return;
            state.isSwaying = true;
            const coords = getCanvasCoords(e);
            executePaintSway(coords.x, coords.y);
        });

        el.canvas.addEventListener('mousemove', (e) => {
            if (!state.isSwaying) return;
            const coords = getCanvasCoords(e);
            executePaintSway(coords.x, coords.y);
        });

        window.addEventListener('mouseup', () => state.isSwaying = false);

        function executePaintSway(canvasX, canvasY) {
            const size = state.pixelSize;
            const x = Math.floor(canvasX / size);
            const y = Math.floor(canvasY / size);

            if (y < 0 || y >= state.mapData.length || x < 0 || x >= state.mapData[0].length) return;
            
            const cell = state.mapData[y][x];
            
            if (!cell.painted && cell.targetIndex === state.activeColorIndex) {
                cell.painted = true;
                
                el.ctx.fillStyle = cell.color;
                el.ctx.fillRect(x * size, y * size, size, size);
            }
        }

        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        el.exportBtn.addEventListener('click', () => {
            if (!state.originalImage) return;
            const link = document.createElement('a');
            link.download = `pixelsway-art-${Date.now()}.png`;
            link.href = el.canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
